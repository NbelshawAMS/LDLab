<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All My Sons - Estimator Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0a2e12 0%, #14472a 40%, #1a5c35 70%, #0a2e12 100%);
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
      background-size: 44px 44px;
      pointer-events: none;
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 24px;
      padding: 44px 40px 40px;
      box-shadow:
        0 25px 60px rgba(0, 0, 0, 0.35),
        0 0 0 1px rgba(255, 255, 255, 0.1);
      animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-img {
      width: 220px;
      height: auto;
      margin: 0 auto 12px;
      display: block;
      border-radius: 12px;
    }

    .logo-divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #1a5c35, #2e8b57);
      margin: 16px auto;
      border-radius: 2px;
    }

    .logo-subtitle {
      font-size: 15px;
      color: #1a5c35;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .input-group {
      position: relative;
      margin-bottom: 24px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #1a5c35;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      padding: 15px 48px 15px 18px;
      background: #f4f8f5;
      border: 2px solid #d4e5d9;
      border-radius: 12px;
      color: #1a3a24;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }

    .input-wrapper input::placeholder {
      color: #9cb8a5;
    }

    .input-wrapper input:focus {
      border-color: #2e8b57;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(46, 139, 87, 0.15);
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #9cb8a5;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: #1a5c35;
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #1a5c35, #2e8b57);
      border: none;
      border-radius: 12px;
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.25s;
      box-shadow: 0 4px 16px rgba(26, 92, 53, 0.3);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(26, 92, 53, 0.4);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .error-msg {
      text-align: center;
      color: #c0392b;
      font-size: 14px;
      font-weight: 600;
      margin-top: 16px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .error-msg.visible {
      opacity: 1;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: #9cb8a5;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Floating orbs in brand green */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 350px; height: 350px;
      background: rgba(46, 139, 87, 0.15);
      top: -120px; right: -80px;
      animation: float1 8s ease-in-out infinite;
    }
    .orb-2 {
      width: 280px; height: 280px;
      background: rgba(10, 46, 18, 0.25);
      bottom: -100px; left: -80px;
      animation: float2 10s ease-in-out infinite;
    }
    .orb-3 {
      width: 200px; height: 200px;
      background: rgba(46, 139, 87, 0.1);
      top: 50%; left: 60%;
      animation: float3 12s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-30px, 30px); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(20px, -20px); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-15px, -25px); }
    }

    /* Truck silhouettes in background */
    .bg-trucks {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.04;
      overflow: hidden;
    }
  </style>
</head>

      <form id="loginForm">
        <div class="input-group">
          <label>Password</label>
          <div class="input-wrapper">
            <input type="password" id="passwordInput" placeholder="Enter access password" autocomplete="off" autofocus>
            <button type="button" class="toggle-password" onclick="togglePassword()">👁</button>
          </div>
        </div>

        <button type="submit" class="login-btn">Sign In</button>

        <div class="error-msg" id="errorMsg">Incorrect password. Try again.</div>
      </form>

      <div class="footer-text">Internal use only</div>
    </div>
  </div>

  <script>
    async function hashPassword(password) {
      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // SHA-256 hash of the password
    const CORRECT_HASH = 'aeaae5c324bb1ce554de56bc2a19a34a07c48bf420244c63f5ce32540215bc56';

    // Check if already authenticated
    if (sessionStorage.getItem('estimator_hub_auth') === 'true') {
      window.location.href = 'hub.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const password = document.getElementById('passwordInput').value;
      const hash = await hashPassword(password);

      if (hash === CORRECT_HASH) {
        sessionStorage.setItem('estimator_hub_auth', 'true');
        window.location.href = 'hub.html';
      } else {
        const err = document.getElementById('errorMsg');
        err.classList.remove('visible');
        void err.offsetWidth;
        err.classList.add('visible');
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    });

    function togglePassword() {
      const input = document.getElementById('passwordInput');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
